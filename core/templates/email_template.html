<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: #f4f7f9; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .header { background: #2f3542; color: white; padding: 30px; text-align: center; }
        .header h1 { margin: 0; font-size: 24px; font-weight: 600; letter-spacing: -0.5px; }
        .content { padding: 40px; line-height: 1.6; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 14px; font-weight: 700; text-transform: uppercase; margin-bottom: 20px; }
        .status-success { background: #e3fdfd; color: #00b894; }
        .status-error { background: #fff5f5; color: #ff7675; }
        .details-table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        .details-table td { padding: 12px 0; border-bottom: 1px solid #eee; }
        .details-table .label { font-weight: 600; color: #747d8c; width: 140px; }
        .details-table .value { color: #2f3542; }
        .btn { display: inline-block; padding: 12px 24px; background: #57606f; color: white; text-decoration: none; border-radius: 8px; font-weight: 600; margin-top: 30px; transition: background 0.2s; }
        .footer { padding: 30px; text-align: center; color: #a4b0be; font-size: 13px; background: #fafafa; }
        .footer a { color: #747d8c; text-decoration: none; border-bottom: 1px solid #ced6e0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>OracleFT Automator</h1>
        </div>
        <div class="content">
            <div class="status-badge {{ status_class }}">
                {{ status_text }}
            </div>
            <h2>{{ title }}</h2>
            <p>{{ description }}</p>

            {% if details %}
            <table class="details-table">
                {% for key, value in details.items() %}
                <tr>
                    <td class="label">{{ key }}</td>
                    <td class="value">{{ value }}</td>
                </tr>
                {% endfor %}
            </table>
            {% endif %}

            <a href="https://cloud.oracle.com/compute/instances" class="btn">View in Console</a>
        </div>
        <div class="footer">
            <p>Generated by <a href="https://github.com/USER/OracleFT">OracleFT</a></p>
            <p>This is an automated notification. Do not reply to this email.</p>
        </div>
    </div>
</body>
</html>
